{% extends "admin/admin.html" %}

{% block content %}
        <div class="container">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">{{ title }}</h3>
            </div>

            <div class="panel-body">
                {#novalidate的作用是禁止浏览器自动校验#}
                <form method="post" novalidate onsubmit="return checkResAndSubmit();">
                    {% csrf_token %}
                    <div class="form-group">
                     <label>标题</label>
                        {{ form.title }}
                        <span style="color: red;">{{ field.errors.0 }}</span>
                        </div>
                    <div class="form-group">
                     <label>内容</label>
                        {{form.media}}
                        {{ form.content }}
                        <span style="color: red;">{{ field.errors.0 }}</span>
                        </div>

                    <button type="submit" class="btn btn-primary btn-sm">提 交</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
