{% extends "admin/admin.html" %}
{% load static %}

{% block title %}
    <title>数据分析</title>
{% endblock %}

{% block content %}
<div class="container" style="margin-top:25px;">
    <div class="panel">
        <div class="panel-heading">📊 数据分析平台</div>
        <div class="panel-body">
            <div class="row">
                <div class="col-md-6" style="padding:20px;">
                    <p style="font-size:18px;font-weight:700;color:#2d3436;text-align:center;margin-bottom:15px;">📝 文章类别分布</p>
                    <div id="m1" style="width:100%;height:430px;"></div>
                </div>
                <div class="col-md-6" style="padding:20px;">
                    <p style="font-size:18px;font-weight:700;color:#2d3436;text-align:center;margin-bottom:15px;">🎁 商品类别分布</p>
                    <div id="m2" style="width:100%;height:430px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
    <script src="{% static 'js/echarts.js' %}"></script>
    <script>
    $(function() { initPie1(); initPie2(); });

    function makeOption() {
        return {
            tooltip: { trigger: 'item' },
            legend: { top: '5%', left: 'center' },
            series: [{
                type: 'pie',
                radius: ['40%', '75%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: true },
                emphasis: { label: { show: true, fontSize: 20, fontWeight: 'bold' } },
                data: []
            }]
        };
    }

    function initPie1(){
        var chart = echarts.init(document.getElementById('m1'));
        var opt = makeOption();
        opt.series[0].name = '文章类别';
        $.ajax({
            url: "/admin/art/chartpie/", type: "GET", dataType: "JSON",
            success: function(res){
                if(res.status){
                    opt.series[0].data = res.data;
                    chart.setOption(opt);
                }
            }
        });
    }

    function initPie2(){
        var chart = echarts.init(document.getElementById('m2'));
        var opt = makeOption();
        opt.series[0].name = '商品类别';
        $.ajax({
            url: "/admin/comm/chartpie/", type: "GET", dataType: "JSON",
            success: function(res){
                if(res.status){
                    opt.series[0].data = res.data;
                    chart.setOption(opt);
                }
            }
        });
    }
    </script>
{% endblock %}
