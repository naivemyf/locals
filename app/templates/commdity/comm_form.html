{% extends "merchant/merchant.html" %}
{% load static %}

{% block content %}
<div class="container" style="margin-top:25px;">
    <div class="panel" style="max-width:650px;margin:0 auto;">
        <div class="panel-heading">{{ title }}</div>
        <div class="panel-body" style="font-size:15px;">
            <form method="post" novalidate style="max-width:500px;margin:0 auto;"
                  id="CommdityList" enctype="multipart/form-data">
                {% csrf_token %}
                {% for i in form %}
                <div class="form-group">
                    <label style="font-weight:600;">{{ i.label }}</label>
                    {{ i }}
                    {% if title == '特色产品添加' %}
                    <span style="color:#e74c3c;font-size:13px;">{{ i.errors.0 }}</span>
                    {% endif %}
                </div>
                {% endfor %}
                <div style="margin-top:15px;">
                    <button type="submit" class="btn btn-primary" id="add_save">💾 发布</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script type="text/javascript" src="{% static 'js/CommdityAjax.js' %}"></script>
<script>
var pic = document.getElementById('id_pic');
if (pic) { pic.style.width = '75px'; pic.style.height = '30px'; }
</script>
{% endblock %}
