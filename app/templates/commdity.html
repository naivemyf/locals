{% extends "merchant.html" %}

{% block content %}
<div class="panel panel-default" style="width: 40%; margin: auto;margin-top: 5%" >
    <h2 style="text-align: center">商品添加</h2>
    <div class="panel-body" style="width: 40%;height:430px;display:inline-block;margin-right: 50px;margin-left: 50px; "></div>
    <div class="panel-body"  style="display: inline-block;" >
        <form method="post" novalidate style="margin: auto" enctype='multipart/form-data'>
            {% csrf_token %}
            {%  for i in form %}
        <div class="form-group" >
            <label >{{i.label }}</label>
            <div style="width: 80%">{{i}}</div>
            <span style="color: red">{{ i.errors.0 }}</span>
        </div>
            {% endfor %}
        <label for="pic">商品图片</label>
        <input id="image-uploadify" name="pic" type="file"
               accept=".xlsx,.xls,image/*,.doc,audio/*,.docx,video/*,.ppt,.pptx,.txt,.pdf" multiple>
        <div style="height: 20px;"></div>
        <button type="submit" class="btn btn-default">Submit</button>
    </form>
    </div>
</div>
{% endblock %}
