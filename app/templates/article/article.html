{% extends "user/layout.html" %}
{% load static %}

{% block title %}
    <title>{{ title }}</title>
{% endblock %}

{% block js %}
    <script src="{% static 'admin/js/vendor/jquery/jquery.min.js' %}"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/wangeditor@latest/dist/wangEditor.min.js"></script>
    <script src="{% static 'js/wang_editor_config.js' %}"></script>
    <script>
    function checkResAndSubmit() {
        var res = {{ res|default:0 }};
        if (res > 0) {
            alert("文章内容中出现敏感词，请修改！！！");
            return false;
        }
        return true;
    }
    </script>
{% endblock %}

{% block content %}
<div class="container" style="margin-top:25px;">
    <div class="panel" style="max-width:800px;margin:0 auto;">
        <div class="panel-heading">📝 {{ title }}</div>
        <div class="panel-body">
            <form method="post" novalidate onsubmit="return checkResAndSubmit();">
                {% csrf_token %}
                {% for field in form %}
                    <div class="form-group">
                        <label style="font-weight:600;">{{ field.label }}</label>
                        {{ field }}
                        <span style="color:#e74c3c;font-size:13px;">{{ field.errors.0 }}</span>
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">💾 提 交</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
