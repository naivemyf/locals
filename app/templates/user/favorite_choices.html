{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>特产兴趣选择</title>
    <link rel="stylesheet" href="{% static 'plugins/bootstrap-3.4.1/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/modern.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #fef5f5 0%, #f5f6fa 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .choice-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
        }
        .choice-container h1 { text-align:center; font-weight:700; color:#2d3436; margin-bottom:8px; }
        .choice-container .subtitle { text-align:center; color:#b2bec3; font-size:15px; margin-bottom:30px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 10px 0;
            max-width: 750px;
            margin: 0 auto;
        }
        .grid-item {
            text-align: center;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding-bottom: 10px;
        }
        .grid-item:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .grid-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .grid-item span {
            display: block;
            padding: 10px 0;
            font-size: 17px;
            font-weight: 600;
            color: #2d3436;
        }
        .grid-item.selected {
            border: 4px solid #e74c3c;
            transform: scale(1.05);
        }
        .grid-item.selected::after {
            content: "✓";
            position: absolute;
            top: 10px;
            right: 15px;
            background: #e74c3c;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-submit {
            display: block;
            margin: 30px auto 0;
            padding: 14px 60px;
            font-size: 18px;
        }
        .btn-skip {
            position: absolute;
            top: 25px;
            right: 30px;
        }
    </style>
</head>
<body>
<script src="{% static 'js/jquery-3.6.0.js' %}"></script>
<script src="{% static 'plugins/bootstrap-3.4.1/js/bootstrap.min.js' %}"></script>

<div class="choice-container">
    <a class="btn btn-default btn-skip" href="/index/">跳过 →</a>
    <h1>👋 欢迎注册！</h1>
    <p class="subtitle">请选择您感兴趣的特产分类，我们将为您精准推荐</p>

    <div class="grid-container">
        {% for i in form %}
        <div class="grid-item">
            <img src="{{ i.pic.url }}" alt="{{ i.name }}">
            <span>{{ i.name }}</span>
        </div>
        {% endfor %}
    </div>

    <button class="btn btn-primary btn-submit" onclick="submitSelection()">✨ 提交选择</button>
</div>

<script>
const imageElements = document.querySelectorAll('.grid-item img');
imageElements.forEach(img => {
    img.addEventListener('click', () => {
        img.parentElement.classList.toggle('selected');
    });
});

function submitSelection() {
    let loveDict = [];
    const selectedItems = document.querySelectorAll('.grid-item');
    selectedItems.forEach(item => {
        if (item.classList.contains('selected')) {
            var img = item.querySelector('img');
            if (img) { loveDict.push(img.alt); }
        }
    });

    $.ajax({
        type: 'POST',
        url: '/chocies/fav/',
        data: { "filelist": loveDict },
        dataType: 'JSON',
        traditional: true,
        success: function (res) {
            if (res.status) {
                window.location.href = "/login/";
            } else {
                alert(res.mes);
            }
        }
    });
}
</script>
</body>
</html>
