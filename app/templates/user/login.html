{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户登录 — 红河州特产平台</title>
    <link rel="stylesheet" href="{% static 'plugins/bootstrap-3.4.1/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/modern.css' %}">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(231,76,60,0.08) 0%, rgba(0,0,0,0.02) 100%),
                        url('{% static "img/blackground/1713692167676.png" %}') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card .code-img {
            border-radius: 6px;
            cursor: pointer;
            height: 44px;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <h2>🔑 用户登录</h2>
        <form method="post" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label>📱 账号（手机号）</label>
                {{ form.phonenumber }}
                <span style="color:#e74c3c;font-size:13px;">{{ form.phonenumber.errors.0 }}</span>
            </div>

            <div class="form-group">
                <label>🔒 密码</label>
                {{ form.password }}
                <span style="color:#e74c3c;font-size:13px;">{{ form.password.errors.0 }}</span>
            </div>

            <div class="form-group">
                <label>🖼 图片验证码</label>
                <div class="row">
                    <div class="col-xs-7" style="padding-right:8px;">
                        {{ form.code }}
                        <span style="color:#e74c3c;font-size:13px;">{{ form.code.errors.0 }}</span>
                    </div>
                    <div class="col-xs-5" style="padding-left:0;">
                        <img id="image_code" src="/image/code/" class="code-img"
                             onclick="this.src='/image/code/?'+new Date().getTime()"
                             title="点击刷新验证码">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:10px;">登 录</button>

            <div style="text-align:center;margin-top:18px;font-size:14px;color:#636e72;">
                还没有账号？<a href="/register/" style="color:#e74c3c;font-weight:600;">立即注册</a>
                &nbsp;|&nbsp;
                <a href="/index/" style="color:#636e72;">先看看首页</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
