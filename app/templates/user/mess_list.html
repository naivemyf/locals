{% extends "article/art_list.html" %}
{% block content %}
    <div class="container">

    <div class="bs-example" data-example-id="condensed-table">
    <table class="table ">
      <thead>
        <tr>
          <th>序号</th>
          <th>标题</th>
          <th>时间</th>
          <th>发布人</th>
        </tr>
      </thead>
      <tbody>
      {% for i in list %}
        <tr>
          <th scope="row">{{ forloop.counter }}</th>
          <td><a href="/admin/mess/{{ i.id }}/detail/">{{ i.title }}</a></td>

          <td>{{ i.time|date:"Y-m-d H:i:s"   }}</td>
          <td>{{ i.name }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
     <ul class ="pagination">
        {{page_string}}
    </ul>
    </div>

{% endblock %}
