{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户注册 — 红河州特产平台</title>
    <link rel="stylesheet" href="{% static 'plugins/bootstrap-3.4.1/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/modern.css' %}">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(231,76,60,0.08) 0%, rgba(0,0,0,0.02) 100%),
                        url('{% static "img/blackground/1713692163059.png" %}') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card" style="width:460px;">
        <h2>📝 用户注册</h2>
        <form method="post" novalidate>
            {% csrf_token %}
            {% for i in form %}
            <div class="form-group">
                <label>{{ i.label }}</label>
                {{ i }}
                <span style="color:#e74c3c;font-size:13px;">{{ i.errors.0 }}</span>
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary" style="margin-top:5px;">注 册</button>

            <div style="text-align:center;margin-top:18px;font-size:14px;color:#636e72;">
                已有账号？<a href="/login/" style="color:#e74c3c;font-weight:600;">直接登录</a>
                &nbsp;|&nbsp;
                <a href="/index/" style="color:#636e72;">先看看首页</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
